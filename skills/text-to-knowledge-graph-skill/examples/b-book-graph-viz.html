// ===== TOOLTIP =====
const tooltip = d3.select("#tooltip");

function showTooltip(event, d) {
  const color = TYPE_COLORS[d.type] || "#fff";
  tooltip
    .style("display", "block")
    .html(`
      <div class="tip-title" style="color:${color}">${d.label}</div>
      <div class="tip-type">${d.type} · Level ${d.level}</div>
      <div class="tip-summary">${d.summary || ''}</div>
    `);
  moveTooltip(event);
}

function moveTooltip(event) {
  const t = d3.select("#tooltip");
  let left = event.offsetX + 16;
  let top = event.offsetY - 10;
  const tw = t.node().offsetWidth || 280;
  const th = t.node().offsetHeight || 100;
  if (left + tw + 20 > w) left = event.offsetX - tw - 16;
  if (top + th + 20 > h) top = h - th - 20;
  if (top < 10) top = 10;
  t.style("left", left + "px").style("top", top + "px");
}

function hideTooltip() {
  tooltip.style("display", "none");
}

// ===== BUILD DATA =====
const nodes = graphData.nodes.map(d => ({ ...d }));
const nodeMap = {};
nodes.forEach(n => nodeMap[n.id] = n);

const edges = graphData.edges.map(d => {
  return {
    ...d,
    source: nodeMap[d.source],
    target: nodeMap[d.target]
  };
});

// ===== GRADIENTS =====
const defs = svg.append("defs");
TYPE_ORDER.forEach(type => {
  const color = TYPE_COLORS[type];
  defs.append("radialGradient")
    .attr("id", "grad-" + type.replace(/\s/g,''))
    .attr("cx","30%").attr("cy","30%").attr("r","70%")
    .append("stop").attr("offset","0%").attr("stop-color", d3.color(color).brighter(0.3));
  d3.select("#grad-" + type.replace(/\s/g,''))
    .append("stop").attr("offset","100%").attr("stop-color", color);
});

// ===== DRAW =====

var edgeLabelVisible = true;

// Edges (links)
const linkGroup = g.append("g").attr("class", "links");
const link = linkGroup.selectAll("line")
  .data(edges)
  .join("line")
  .attr("stroke", "rgba(255,255,255,0.12)")
  .attr("stroke-width", 1.2)
  .attr("stroke-opacity", 0.6);

// Edge labels
const edgeLabelGroup = g.append("g").attr("class", "edge-labels");
const edgeLabel = edgeLabelGroup.selectAll("text")
  .data(edges)
  .join("text")
  .text(d => d.relation)
  .attr("font-size", 9)
  .attr("fill", "rgba(255,255,255,0.35)")
  .attr("text-anchor", "middle")
  .attr("dy", "-6")
  .attr("pointer-events", "none");

// Edge paths for hover detection
const edgeHit = g.append("g").attr("class", "edge-hits")
  .selectAll("line")
  .data(edges)
  .join("line")
  .attr("stroke", "transparent")
  .attr("stroke-width", 12)
  .attr("pointer-events", "stroke")
  .on("mouseover", function(event, d) {
    d3.select(this).attr("stroke", "rgba(255,255,255,0.05)");
    showTooltip(event, { label: d.relation, type: "关系", level: "", summary: d.summary || "" });
  })
  .on("mousemove", moveTooltip)
  .on("mouseout", function() {
    d3.select(this).attr("stroke", "transparent");
    hideTooltip();
  });

// Nodes
const nodeGroup = g.append("g").attr("class", "nodes");
const node = nodeGroup.selectAll("g")
  .data(nodes)
  .join("g")
  .attr("cursor", "grab")
  .call(d3.drag()
    .on("start", dragStarted)
    .on("drag", dragged)
    .on("end", dragEnded)
  );

// Node circles
node.append("circle")
  .attr("r", d => LEVEL_RADII[d.level] || 18)
  .attr("fill", d => "url(#grad-" + d.type.replace(/\s/g,'') + ")")
  .attr("stroke", d => TYPE_COLORS[d.type] || "#fff")
  .attr("stroke-width", d => Math.max(1, d.level + 1))
  .attr("stroke-opacity", 0.9)
  .attr("filter", "drop-shadow(0 2px 6px rgba(0,0,0,0.4))")
  .on("mouseover", function(event, d) {
    d3.select(this).transition().duration(150).attr("filter", "drop-shadow(0 0 12px " + TYPE_COLORS[d.type] + "88)");
    showTooltip(event, d);
  })
  .on("mousemove", moveTooltip)
  .on("mouseout", function() {
    d3.select(this).transition().duration(150).attr("filter", "drop-shadow(0 2px 6px rgba(0,0,0,0.4))");
    hideTooltip();
  })
  .on("click", function(event, d) {
    event.stopPropagation();
    handleNodeClick(d);
  });

// Node labels
node.append("text")
  .text(d => {
    const maxChars = d.level === 0 ? 10 : d.level <= 1 ? 10 : d.level <= 2 ? 8 : 6;
    return d.label.length > maxChars ? d.label.slice(0, maxChars) + '…' : d.label;
  })
  .attr("text-anchor", "middle")
  .attr("dy", d => LEVEL_RADII[d.level] + 14)
  .attr("fill", "#e6edf3")
  .attr("font-size", d => Math.max(9, 14 - d.level * 1.5))
  .attr("font-weight", d => d.level <= 1 ? 700 : 500)
  .attr("pointer-events", "none")
  .attr("paint-order", "stroke")
  .attr("stroke", "#0d1117")
  .attr("stroke-width", 2.5)
  .attr("stroke-linecap", "round")
  .attr("stroke-linejoin", "round");

// Inner label on node
node.append("text")
  .text(d => {
    if (d.level <= 1) return '';
    const icons = { Concept:'●', Module:'◆', Process:'▶', Role:'👤', Rule:'⚙', Metric:'📊', Risk:'⚠', Tool:'🔧', Data:'📦', Decision:'🎯', Output:'📋' };
    return icons[d.type] || '○';
  })
  .attr("text-anchor", "middle")
  .attr("dy", 4)
  .attr("fill", "#fff")
  .attr("font-size", d => Math.max(10, 16 - d.level * 2))
  .attr("pointer-events", "none")
  .attr("opacity", 0.8);

// ===== SIMULATION =====
const sim = d3.forceSimulation(nodes)
  .force("link", d3.forceLink(edges).id(d => d.id).distance(d => {
    const l = Math.min(d.source.level, d.target.level);
    return 80 + l * 30;
  }).strength(0.4))
  .force("charge", d3.forceManyBody().strength(d => -600 - (3 - d.level) * 200))
  .force("center", d3.forceCenter(w / 2, h / 2).strength(0.08))
  .force("collide", d3.forceCollide(d => LEVEL_RADII[d.level] + 30))
  .on("tick", ticked);

// ===== FUNCTIONS =====

function ticked() {
  link
    .attr("x1", d => d.source.x)
    .attr("y1", d => d.source.y)
    .attr("x2", d => d.target.x)
    .attr("y2", d => d.target.y);
  edgeLabel
    .attr("x", d => (d.source.x + d.target.x) / 2)
    .attr("y", d => (d.source.y + d.target.y) / 2);
  edgeHit
    .attr("x1", d => d.source.x)
    .attr("y1", d => d.source.y)
    .attr("x2", d => d.target.x)
    .attr("y2", d => d.target.y);
  node.attr("transform", d => `translate(${d.x},${d.y})`);
}

function dragStarted(event, d) {
  if (!event.active) sim.alphaTarget(0.3).restart();
  d.fx = d.x;
  d.fy = d.y;
  d3.select(this).attr("cursor", "grabbing");
}

function dragged(event, d) {
  d.fx = event.x;
  d.fy = event.y;
}

function dragEnded(event, d) {
  if (!event.active) sim.alphaTarget(0);
  d.fx = null;
  d.fy = null;
  d3.select(this).attr("cursor", "grab");
}

function handleNodeClick(clickedNode) {
  // Build adjacency set
  const adjNodes = new Set();
  const adjEdges = new Set();
  adjNodes.add(clickedNode.id);
  
  edges.forEach(e => {
    const sid = typeof e.source === 'object' ? e.source.id : e.source;
    const tid = typeof e.target === 'object' ? e.target.id : e.target;
    if (sid === clickedNode.id || tid === clickedNode.id) {
      adjNodes.add(sid);
      adjNodes.add(tid);
      adjEdges.add(e.id);
    }
  });

  // Highlight nodes
  node.selectAll("circle")
    .transition().duration(300)
    .attr("opacity", d => adjNodes.has(d.id) ? 1 : 0.18);
  node.selectAll("text")
    .transition().duration(300)
    .attr("opacity", d => adjNodes.has(d.id) ? 1 : 0.18);
  
  // Highlight edges
  link.transition().duration(300)
    .attr("stroke-opacity", d => adjEdges.has(d.id) ? 0.7 : 0.05)
    .attr("stroke", d => adjEdges.has(d.id) ? (
      d.source.id === clickedNode.id || d.target.id === clickedNode.id ? TYPE_COLORS[clickedNode.type] || "#fff" : "rgba(255,255,255,0.4)"
    ) : "rgba(255,255,255,0.12)")
    .attr("stroke-width", d => adjEdges.has(d.id) ? 2.5 : 0.8);
  
  edgeLabel.transition().duration(300)
    .attr("opacity", d => adjEdges.has(d.id) ? 0.9 : 0.04);

  // Mark selected node
  node.selectAll("circle")
    .filter(d => d.id === clickedNode.id)
    .transition().duration(300)
    .attr("filter", "drop-shadow(0 0 18px " + TYPE_COLORS[clickedNode.type] + ")")
    .attr("stroke-width", Math.max(1, clickedNode.level + 3));
}

// Click on background to reset highlights
svg.on("click", function() {
  resetHighlight();
});

function resetHighlight() {
  node.selectAll("circle")
    .transition().duration(400)
    .attr("opacity", 1)
    .attr("filter", "drop-shadow(0 2px 6px rgba(0,0,0,0.4))")
    .attr("stroke-width", d => Math.max(1, d.level + 1));
  node.selectAll("text")
    .transition().duration(400)
    .attr("opacity", 1);
  link.transition().duration(400)
    .attr("stroke-opacity", 0.6)
    .attr("stroke", "rgba(255,255,255,0.12)")
    .attr("stroke-width", 1.2);
  edgeLabel.transition().duration(400)
    .attr("opacity", edgeLabelVisible ? 1 : 0);
}

// ===== LEGEND =====
const legendDiv = d3.select("#legend");
TYPE_ORDER.forEach(type => {
  const color = TYPE_COLORS[type];
  const row = legendDiv.append("div").attr("class", "legend-item");
  row.append("div").attr("class", "legend-dot").style("background", color).style("box-shadow", "0 0 6px " + color + "44");
  row.append("span").text(type);
});

// ===== CONTROLS =====

// Reset view
document.getElementById("btn-reset").addEventListener("click", () => {
  svg.transition().duration(750).call(zoom.transform, d3.zoomIdentity);
  resetHighlight();
  sim.alpha(0.3).restart();
});

// Toggle edge labels
document.getElementById("btn-edge-labels").addEventListener("click", function() {
  edgeLabelVisible = !edgeLabelVisible;
  this.classList.toggle("active");
  edgeLabel.transition().duration(300).attr("opacity", edgeLabelVisible ? 1 : 0);
});

// ===== RESIZE =====
window.addEventListener("resize", () => {
  const nw = container.clientWidth;
  const nh = container.clientHeight;
  svg.attr("viewBox", [0, 0, nw, nh]);
  sim.force("center", d3.forceCenter(nw / 2, nh / 2));
  sim.alpha(0.1).restart();
});

// ===== INITIAL ZOOM FIT =====
// Let the simulation stabilize first, then fit
setTimeout(() => {
  resetHighlight();
  // Auto-fit after stabilization
  const bounds = g.node().getBBox();
  if (bounds.width > 0 && bounds.height > 0) {
    const scale = Math.min(nw / (bounds.width + 200), nh / (bounds.height + 200), 1.2);
    const tx = nw / 2 - (bounds.x + bounds.width / 2) * scale;
    const ty = nh / 2 - (bounds.y + bounds.height / 2) * scale;
    svg.transition().duration(800).call(zoom.transform, d3.zoomIdentity.translate(tx, ty).scale(scale));
  }
}, 2000);

// Keep stabilizing
setTimeout(() => { sim.alpha(0.05).restart(); }, 500);
setTimeout(() => { sim.alpha(0.02).restart(); }, 1500);
setTimeout(() => { sim.alphaTarget(0); }, 3000);

</script>
</body>
</html>
